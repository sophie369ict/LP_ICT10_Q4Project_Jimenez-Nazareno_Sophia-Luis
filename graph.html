        .menu-card {
            border-radius: 18px;
            padding: 22px;

            font-weight: 600;
            margin-bottom: 15px;

            color: #000000;

        .form-control {
            border-radius: 10px;
            border: none;
            padding: 10px;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(0, 81, 255, 0.3);
        }

        .btn {
            background: #052a91;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            padding: 8px 14px;
            margin-right: 5px;
        }

        #notif {
            margin-top: 10px;
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: 600;
            background-color: #e6ffed;
            color: #1a7f37;
            border-left: 4px solid #1a7f37;
        }

        .custom-navbar {
            background-color: #052a91;
            color: #ffffff
        }

        .menu-card h5 {
            margin: 0;
            border-radius: 10px;
        }

    <h2 style="text-align: center;">Grade 10 Sapphire:  Attendance Checker🎓</h2>

    <div class="container py-3">
        <div class="row g-4 align-items-start">

            <!-- LEFT: Attendance Card -->
            <div class="col-md-6">
                <div class="menu-card p-4" style="max-width: 600px; max-height: 500px;">
                    <h5 class="mb-3" style="color:#ffffff; background-color:#052a91; padding:10px; margin-top:0;">
                        Attendance Tracker
                    </h5>

                    <div class="mb-3">
                        <select class="form-select" id="Select_Day" name="SelectDay">
                            <option selected>Choose the Week here</option>
                            <option value="Week1">Week1</option>
                            <option value="Week2">Week2</option>
                            <option value="Week3">Week3</option>
                            <option value="Week4">Week4</option>
                            <option value="Week5">Week5</option>
                            <option value="Week6">Week6</option>
                            <option value="Week7">Week7</option>
                            <option value="Week8">Week8</option>
                            <option value="Week9">Week9</option>
                            <option value="Week10">Week10</option>
                            <option value="Week11">Week11</option>
                            <option value="Week12">Week12</option>
                            <option value="Week13">Week13</option>
                            <option value="Week14">Week14</option>
                            <option value="Week15">Week15</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label"><b>💯Number of Absences</b></label>
                        <input type="number" class="form-control" id="absences">
                    </div>

                    <button class="btn btn-dark" py-click="addgraph">Add to graph</button>
                </div>
            </div>

            <!-- RIGHT: Graph -->
            <div class="col-md-6">
                <div class="menu-card p-4" style="min-width: 300px;">
                    <h5 class="mb-3" style="color:#ffffff; background-color:#052a91; padding:10px; margin-top:0;">
                        Visual Graph
                    </h5>
                    <img src="" alt="" id="graphforplot" style="width:100%;">
                </div>
            </div>

        </div>
    </div>
